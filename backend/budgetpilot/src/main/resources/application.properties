spring.config.import=optional:dotenv:.env
spring.application.name=budgetpilot

# Load DB settings from environment or .env (e.g. DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}